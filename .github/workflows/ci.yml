name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint & type-check (fast gate — runs on one Python version only)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check --output-format=github .

      - name: Run ruff (format check)
        run: ruff format --check .

      - name: Run mypy (strict)
        run: mypy llm_toolkit_schema tests

  # ──────────────────────────────────────────────────────────────────────────
  # Test matrix (3.9 → 3.12)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Reduce Windows CI load — only test oldest and newest
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Run unit & integration tests with coverage
        run: >
          pytest
          --tb=short
          --strict-markers
          -v
          --cov=llm_toolkit_schema
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=100
          -m "not perf"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Performance benchmarks (single run on Python 3.12 / ubuntu)
  # ──────────────────────────────────────────────────────────────────────────
  perf:
    name: Performance benchmarks
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Run performance tests
        run: >
          pytest
          -m "perf"
          --tb=short
          -v

  # ──────────────────────────────────────────────────────────────────────────
  # Security scan via pip-audit
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --require-hashes -r <(pip install -e ".[dev]" --dry-run --report json | python -c "
import json, sys
data = json.load(sys.stdin)
for item in data.get('install', []):
    print(item['metadata']['name'] + '==' + item['metadata']['version'])
" || echo "skipped") 2>/dev/null || pip-audit
